<!DOCTYPE html>
<html>
<head>
  <title>Harry Potter World</title>

  <link rel="icon" type="image/png" href="53e3556b51b1ab6e70218fd02a773825.png">

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Cinzel&display=swap" rel="stylesheet">

  <style>
    body {
      background: radial-gradient(circle, #1a1a1a, black);
      color: white;
      text-align: center;
      font-family: 'Cinzel', serif;
    }

    h1 {
      color: gold;
      margin-top: 30px;
    }

    .container {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
    }

    .card {
      border: 2px solid gold;
      margin: 20px;
      padding: 15px;
      border-radius: 15px;
      width: 250px;
      box-shadow: 0 0 15px gold;
      transition: 0.3s;
      background-color: #111;
    }

    .card:hover {
      transform: scale(1.05);
    }

    img {
      width: 100%;
      height: 250px;
      object-fit: cover;
      border-radius: 10px;
      transition: 0.3s;
    }

    .card:hover img {
      transform: scale(1.05);
    }

    button {
      margin-top: 10px;
      padding: 8px 12px;
      border: none;
      background-color: gold;
      color: black;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background-color: orange;
    }

    .info {
      display: none;
      margin-top: 10px;
      font-size: 14px;
      color: #ddd;
    }
  </style>
</head>

<body>

<h1>✨ Wizarding World </h1>

<div class="container">

  <!-- Harry -->
  <div class="card">
    <img src="a99a02f224035066be61d7069a13357b.jpg">
    <h2>Harry Potter</h2>
    <p>The boy who lived.</p>
    <button onclick="showInfo('harry')">More Info</button>
    <div id="harry" class="info">
      Famous wizard, defeated Voldemort and saved the wizarding world.
    </div>
  </div>

  <!-- Hermione -->
  <div class="card">
    <img src="https://upload.wikimedia.org/wikipedia/en/d/d3/Hermione_Granger_poster.jpg">
    <h2>Hermione Granger</h2>
    <p>Smartest witch.</p>
    <button onclick="showInfo('hermione')">More Info</button>
    <div id="hermione" class="info">
      Brilliant student, loves books and always saves the day.
    </div>
  </div>

  <!-- Ron -->
  <div class="card">
    <img src="3c6c37f765ce8cf3cfc92cb89949e099.jpg">
    <h2>Ron Weasley</h2>
    <p>Loyal best friend.</p>
    <button onclick="showInfo('ron')">More Info</button>
    <div id="ron" class="info">
      Funny and brave, always stands by Harry and Hermione.
    </div>
  </div>

</div>

<!-- JavaScript -->
<script>
  function showInfo(id) {
    var element = document.getElementById(id);

    if (element.style === "block") {
      element.style = "none";
    } else {
      element.style = "block";
    }
  }
</script>

</body>
</html>
